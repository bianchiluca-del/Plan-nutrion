        { name:"Maltodextrine", qty:50, unit:"g", ref:100, cal:380, prot:0.1, gluc:95, lip:0.1 },
        { name:"Iso whey", qty:15, unit:"g", ref:100, cal:474, prot:90, gluc:1, lip:0 },
        { name:"Electrolytes", supplement:true },
      ]},
  ]},
};

const MONTHS = ["Janvier","Fevrier","Mars","Avril","Mai","Juin","Juillet","Aout","Septembre","Octobre","Novembre","Decembre"];
const DAYS_SHORT = ["Lun","Mar","Mer","Jeu","Ven","Sam","Dim"];
const MENS_FIELDS = [
  { key:"poids",    label:"Poids",     unit:"kg",  step:"0.1" },
  { key:"bicepsD",  label:"Biceps D",  unit:"cm",  step:"0.5" },
  { key:"bicepsG",  label:"Biceps G",  unit:"cm",  step:"0.5" },
  { key:"poitrine", label:"Poitrine",  unit:"cm",  step:"0.5" },
  { key:"nombril",  label:"Nombril",   unit:"cm",  step:"0.5" },
  { key:"fesses",   label:"Fesses",    unit:"cm",  step:"0.5" },
  { key:"cuisseD",  label:"Cuisse D",  unit:"cm",  step:"0.5" },
  { key:"cuisseG",  label:"Cuisse G",  unit:"cm",  step:"0.5" },
];

function calcItem(item) {
  if (item.supplement || !item.qty) return { cal:0, prot:0, gluc:0, lip:0 };
  const r = item.qty / item.ref;
  return { cal:Math.round(r*item.cal), prot:Math.round(r*item.prot*10)/10, gluc:Math.round(r*item.gluc*10)/10, lip:Math.round(r*item.lip*10)/10 };
}
function getAllItems(meal) { return meal.subGroups ? meal.subGroups.flatMap(g=>g.items) : (meal.items||[]); }
function toKey(y,m,d) { return `${y}-${String(m+1).padStart(2,"0")}-${String(d).padStart(2,"0")}`; }
function nextId(arr) { return arr.length ? Math.max(...arr.map(r=>r.id))+1 : 1; }
function r1(n) { return Math.round(n*10)/10; }
function macroPill(m, small) {
  const s = small ? 9:11, sv = small ? 11:13;
  return [
    {l:"kcal",v:Math.round(m.cal),c:"#e65100",bg:"#fff3e0"},
    {l:"prot",v:r1(m.prot)+"g",c:"#1b5e20",bg:"#e8f5e9"},
    {l:"gluc",v:r1(m.gluc)+"g",c:"#0d47a1",bg:"#e3f2fd"},
    {l:"lip", v:r1(m.lip)+"g", c:"#880e4f",bg:"#fce4ec"},
  ].map(p=>`<div class="macro-pill" style="background:${p.bg}"><span class="ml" style="color:${p.c};font-size:${s}px">${p.l}</span><span class="mv" style="color:${p.c};font-size:${sv}px">${p.v}</span></div>`).join("");
}
function showToast(msg) {
  const t = document.getElementById("toast");
  t.textContent = msg || "Enregistre ✓";
  t.classList.add("show");
  setTimeout(()=>t.classList.remove("show"), 2200);
}

function renderPlan() {
  const plan = PLANS[STATE.activePlan];
  const totals = plan.meals.reduce((acc,meal)=>{
    getAllItems(meal).forEach(item=>{
      const active = item.isProtein ? item.opts[STATE.proteinSelections[item.name+meal.id]||0] : item;
      const m = calcItem(active);
      acc.cal+=m.cal; acc.prot+=m.prot; acc.gluc+=m.gluc; acc.lip+=m.lip;
    }); return acc;
  }, {cal:0,prot:0,gluc:0,lip:0});

  let html = `
    <div class="plan-btns">
      ${Object.entries(PLANS).map(([k,p])=>`<button class="plan-btn ${STATE.activePlan===k?"active":""}" onclick="setPlan('${k}')">${p.emoji} ${p.label}</button>`).join("")}
    </div>
    <div class="macro-bar">
      <div class="macro-cell"><div class="lbl">Total kcal</div><div class="val" style="color:#e65100">${Math.round(totals.cal)}</div></div>
      <div class="macro-cell"><div class="lbl">Proteines</div><div class="val" style="color:#1b5e20">${Math.round(totals.prot)}g</div></div>
      <div class="macro-cell"><div class="lbl">Glucides</div><div class="val" style="color:#0d47a1">${Math.round(totals.gluc)}g</div></div>
      <div class="macro-cell"><div class="lbl">Lipides</div><div class="val" style="color:#880e4f">${Math.round(totals.lip)}g</div></div>
    </div>
    <p style="font-size:10px;color:#bbb;margin-bottom:10px">▸ OPTIONS = cliquer pour choisir la proteine · titre meal = plier/deplier</p>
  `;

  plan.meals.forEach(meal => {
    const mId = meal.id;
    const isOpen = STATE.openMeals[mId] !== false;
    const mt = getAllItems(meal).reduce((acc,item)=>{
      const active = item.isProtein ? item.opts[STATE.proteinSelections[item.name+mId]||0] : item;
      const m = calcItem(active);
      return {cal:acc.cal+m.cal,prot:acc.prot+m.prot,gluc:acc.gluc+m.gluc,lip:acc.lip+m.lip};
    },{cal:0,prot:0,gluc:0,lip:0});

    html += `<div class="meal-card" style="border-color:${meal.border}">
      <div class="meal-header" style="background:${meal.color}" onclick="toggleMeal('${mId}')">
        <div><h3 style="color:${meal.accent}">${meal.name}</h3><small style="color:${meal.accent}">${meal.time}</small></div>
        <div style="display:flex;align-items:center;gap:8px">
          <span class="meal-kcal" style="color:${meal.accent}">${Math.round(mt.cal)} kcal</span>
          <span class="chevron ${isOpen?"open":""}" style="color:${meal.accent}">▾</span>
        </div>
      </div>
      <div class="meal-body ${isOpen?"open":""}">`;

    function renderItems(items, mealId) {
      let s = "";
      items.forEach((item) => {
        const key = item.name + mealId;
        const selIdx = STATE.proteinSelections[key] || 0;
        const active = item.isProtein ? item.opts[selIdx] : item;
        const m = calcItem(active);
        const isProtOpen = STATE.proteinPanels[key];
        if (item.supplement) {
          s += `<div class="food-row supplement"><div><span class="badge badge-suppl">SUPPL.</span><span class="food-name" style="color:#999">${item.name}</span><div class="food-qty" style="color:#ccc">dose prescrite</div></div></div>`;
        } else if (item.isProtein) {
          s += `<div class="food-row protein" style="border-color:${meal.accent}" onclick="toggleProtein('${key}')">
            <div style="flex:1"><div><span class="badge badge-option" style="background:${meal.color};color:${meal.accent};border-color:${meal.accent}">${isProtOpen?"▾":"▸"} OPTIONS</span><span class="food-name">${active.name}</span></div><div class="food-qty">${active.qty}g</div></div>
            <div class="macros">${macroPill(m,true)}</div>
          </div>`;
          if (isProtOpen) {
            s += `<div class="protein-options"><div class="po-label">Choisis ta proteine</div>`;
            item.opts.forEach((opt,i)=>{
              const om = calcItem(opt);
              s += `<div class="po-row ${selIdx===i?"selected":""}" onclick="selectProtein('${key}',${i})">
                <div><span class="po-name ${selIdx===i?"selected":""}">${selIdx===i?"✓ ":""}${opt.name}</span><span class="po-qty">${opt.qty}g</span></div>
                <div class="macros">${macroPill(om,true)}</div>
              </div>`;
            });
            s += `</div>`;
          }
        } else {
          s += `<div class="food-row"><div style="flex:1"><span class="food-name">${item.name}</span><div class="food-qty">${item.qty} ${item.unit}</div></div><div class="macros">${macroPill(m,true)}</div></div>`;
        }
      });
      return s;
    }

    if (meal.subGroups) {
      meal.subGroups.forEach(g => { html += `<div class="subgroup-label">${g.label}</div>`; html += renderItems(g.items, mId); });
    } else {
      html += renderItems(meal.items||[], mId);
    }
    html += `<div class="meal-total"><span>Total</span><div class="macros">${macroPill(mt,false)}</div></div>`;
    html += `</div></div>`;
  });
  return html;
}

function dayBg(d) {
  if (!d) return "#fff";
  if (d.diet==="ok" && d.training==="ok") return "#e8f5e9";
  if (d.diet==="ok" && d.training==="ko") return "#fff9c4";
  if (d.diet==="ko" && d.training==="ok") return "#fff3e0";
  if (d.diet==="ko" && d.training==="ko") return "#ffebee";
  if (d.diet==="ok") return "#f1f8e9";
  if (d.diet==="ko") return "#fff8f8";
  return "#f5f5f5";
}
function dayBorder(d) {
  if (!d) return "0.5px solid #e0e0e0";
  if (d.diet==="ok") return "1.5px solid #a5d6a7";
  if (d.diet==="ko") return "1.5px solid #ef9a9a";
  return "1px solid #ddd";
}

function renderSuivi() {
  const { calYear:y, calMonth:m, suivi, openDay } = STATE;
  const today = new Date();
  const todayKey = toKey(today.getFullYear(), today.getMonth(), today.getDate());
  const yearBars = Array.from({length:12},(_,mi)=>{
    const ks = Object.keys(suivi).filter(k=>k.startsWith(`${y}-${String(mi+1).padStart(2,"0")}`));
    const ok = ks.filter(k=>suivi[k].diet==="ok").length;
    const total = ks.length;
    const rate = total>0 ? ok/total : null;
    const barColor = rate===null ? "#e0e0e0" : rate>=0.8 ? "#81c784" : rate>=0.5 ? "#ffb74d" : "#e57373";
    const isActive = mi===m;
    return `<div class="year-month" onclick="setCalMonth(${mi})"><div class="bar ${isActive?"active":""}" style="background:${barColor};opacity:${isActive?1:0.55}"></div><span class="lbl ${isActive?"active":""}">${MONTHS[mi].slice(0,3)}</span></div>`;
  }).join("");

  const firstDay = new Date(y, m, 1);
  const lastDay  = new Date(y, m+1, 0);
  let startDow = firstDay.getDay(); startDow = startDow===0?6:startDow-1;
  const totalCells = Math.ceil((startDow+lastDay.getDate())/7)*7;
  const monthKeys = Object.keys(suivi).filter(k=>k.startsWith(`${y}-${String(m+1).padStart(2,"0")}`));
  const dietOk  = monthKeys.filter(k=>suivi[k].diet==="ok").length;
  const dietKo  = monthKeys.filter(k=>suivi[k].diet==="ko").length;
  const trainOk = monthKeys.filter(k=>suivi[k].training==="ok").length;
  const trainKo = monthKeys.filter(k=>suivi[k].training==="ko").length;
  const withCal = monthKeys.filter(k=>suivi[k].cal);
  const avgCal  = withCal.length ? Math.round(withCal.reduce((a,k)=>a+suivi[k].cal,0)/withCal.length) : null;

  let cells = "";
  for (let i=0; i<totalCells; i++) {
    const dn = i-startDow+1;
    if (dn<1||dn>lastDay.getDate()) { cells+=`<div class="cal-day empty"></div>`; continue; }
    const key = toKey(y,m,dn);
    const d = suivi[key]||null;
    const isToday = key===todayKey;
    const hasNote = d && (d.commentDiet||d.commentTraining);
    let badges = "";
    if (d) {
      if (d.diet)     badges += `<span class="day-badge" style="color:${d.diet==="ok"?"#1b5e20":"#b71c1c"}">${d.diet==="ok"?"D✔":"D✘"}</span>`;
      if (d.training) badges += `<span class="day-badge" style="color:${d.training==="ok"?"#1565c0":"#e65100"}">${d.training==="ok"?"T✔":"T✘"}</span>`;
    }
    cells += `<div class="cal-day ${isToday?"today":""}" style="background:${dayBg(d)};border:${isToday?"2.5px solid #1565c0":dayBorder(d)}" onclick="openDay('${key}')">
      <span class="day-num">${dn}</span>
      ${d ? `<div class="day-badges">${badges}</div>${d.cal?`<span class="day-cal">${d.cal}</span>`:""}` : `<span class="day-add">+</span>`}
      ${hasNote?`<div class="note-dot"></div>`:""}
    </div>`;
  }

  let panel = "";
  if (openDay) {
    const dp = suivi[openDay] || null;
    const parts = openDay.split("-");
    const dlabel = `${parts[2]}/${parts[1]}/${parts[0]}`;
    const f = STATE._dayForm || dp || {};
    panel = `<div class="day-panel">
      <div class="dp-header"><h3>📅 ${dlabel}</h3><button class="dp-close" onclick="closeDay()">✕ Fermer</button></div>
      <div class="field-block"><div class="field-label">Calories</div>
        <input class="inp" type="number" placeholder="ex: 2500" value="${f.cal||""}" id="dp-cal" oninput="updateDayForm('cal',this.value)">
      </div>
      <div class="field-block"><div class="field-label">🍽 Diet</div>
        <div class="status-toggle">
          <button class="st-btn ${STATE._dayForm?.diet==="ok"?"ok":""}" onclick="setDayStatus('diet','ok')">✔ OK</button>
          <button class="st-btn ${STATE._dayForm?.diet==="ko"?"ko":""}" onclick="setDayStatus('diet','ko')">✘ Ecart</button>
          <button class="st-btn ${!STATE._dayForm?.diet?"none":""}" onclick="setDayStatus('diet',null)">—</button>
        </div>
      </div>
      <div class="field-block"><div class="field-label">🏋️ Training</div>
        <div class="status-toggle">
          <button class="st-btn ${STATE._dayForm?.training==="ok"?"ok":""}" onclick="setDayStatus('training','ok')">✔ OK</button>
          <button class="st-btn ${STATE._dayForm?.training==="ko"?"ko":""}" onclick="setDayStatus('training','ko')">✘ Ecart</button>
          <button class="st-btn ${!STATE._dayForm?.training?"none":""}" onclick="setDayStatus('training',null)">—</button>
        </div>
      </div>
      <div class="field-block"><div class="field-label">Note diet</div>
        <textarea class="inp" placeholder="Ecart, commentaire, contexte..." id="dp-cd" oninput="updateDayForm('commentDiet',this.value)">${f.commentDiet||""}</textarea>
      </div>
      <div class="field-block"><div class="field-label">Note training</div>
        <textarea class="inp" placeholder="Type de seance, intensite..." id="dp-ct" oninput="updateDayForm('commentTraining',this.value)">${f.commentTraining||""}</textarea>
      </div>
      <div class="dp-actions">
        <button class="btn-save" onclick="saveDay()">Enregistrer</button>
        ${dp?`<button class="btn-clear" onclick="clearDay()">Effacer</button>`:""}
      </div>
    </div>`;
  }

  return `
    <div class="year-strip">${yearBars}</div>
    <div class="cal-nav">
      <button onclick="prevMonth()">‹</button>
      <div class="cal-title"><h3>${MONTHS[m]} ${y}</h3><small>${monthKeys.length} jours enregistres</small></div>
      <button onclick="nextMonth()">›</button>
    </div>
    ${monthKeys.length>0?`<div class="cal-stats">
      <div class="cal-stat" style="background:#e8f5e9"><div class="sl" style="color:#1b5e20">Diet OK</div><div class="sv" style="color:#1b5e20">${dietOk}</div></div>
      <div class="cal-stat" style="background:#ffebee"><div class="sl" style="color:#b71c1c">Ecarts</div><div class="sv" style="color:#b71c1c">${dietKo}</div></div>
      <div class="cal-stat" style="background:#e3f2fd"><div class="sl" style="color:#1565c0">Train OK</div><div class="sv" style="color:#1565c0">${trainOk}</div></div>
      <div class="cal-stat" style="background:#fff3e0"><div class="sl" style="color:#e65100">Train KO</div><div class="sv" style="color:#e65100">${trainKo}</div></div>
      <div class="cal-stat" style="background:#f3e5f5"><div class="sl" style="color:#6a1b9a">Moy kcal</div><div class="sv" style="color:#6a1b9a">${avgCal||"—"}</div></div>
    </div>`:""}
    <div class="day-headers">${DAYS_SHORT.map(d=>`<div class="day-hdr">${d}</div>`).join("")}</div>
    <div class="cal-grid">${cells}</div>
    <div class="cal-legend">
      <div class="leg-item"><div class="leg-box" style="background:#e8f5e9;border-color:#a5d6a7"></div><span>Diet ✔ + Train ✔</span></div>
      <div class="leg-item"><div class="leg-box" style="background:#fff3e0;border-color:#ffb74d"></div><span>Diet ✘ + Train ✔</span></div>
      <div class="leg-item"><div class="leg-box" style="background:#fff9c4;border-color:#f9a825"></div><span>Diet ✔ + Train ✘</span></div>
      <div class="leg-item"><div class="leg-box" style="background:#ffebee;border-color:#ef9a9a"></div><span>Diet ✘ + Train ✘</span></div>
    </div>
    ${panel}`;
}

function renderMensurations() {
  const rows = STATE.mensurations;
  const first = rows[0], last = rows[rows.length-1];
  let summary = "";
  if (rows.length>=2 && first && last) {
    summary = `<div class="mens-summary">
      <div class="mens-stat" style="background:#e3f2fd"><div class="ml" style="color:#1565c0">Poids depart</div><div class="mv" style="color:#1565c0">${first.poids||"—"} kg</div></div>
      <div class="mens-stat" style="background:${last.poids<=first.poids?"#e8f5e9":"#fff3e0"}"><div class="ml" style="color:${last.poids<=first.poids?"#1b5e20":"#e65100"}">Poids actuel</div><div class="mv" style="color:${last.poids<=first.poids?"#1b5e20":"#e65100"}">${last.poids||"—"} kg</div></div>
      <div class="mens-stat" style="background:#e8f5e9"><div class="ml" style="color:#1b5e20">Nombril</div><div class="mv" style="color:#1b5e20">${first.nombril||"—"} → ${last.nombril||"—"} cm</div></div>
      <div class="mens-stat" style="background:#f3e5f5"><div class="ml" style="color:#6a1b9a">Poitrine</div><div class="mv" style="color:#6a1b9a">${first.poitrine||"—"} → ${last.poitrine||"—"} cm</div></div>
    </div>`;
  }
  function mensForm(f, onSave, onCancel, title, color) {
    return `<div class="mens-form" style="border-color:${color||"#a5d6a7"}">
      <h4 style="color:${color||"#1b5e20"}">${title}</h4>
      <div class="field-block"><div class="field-label">Date *</div><input class="inp" type="text" placeholder="JJ/MM/AAAA" value="${f.date||""}" id="mf-date"></div>
      <div class="mens-grid">
        ${MENS_FIELDS.map(fld=>`<div><div class="field-label">${fld.label} (${fld.unit})</div><input class="inp" type="number" step="${fld.step}" placeholder="${fld.key==="poids"?"70.0":"36.0"}" value="${f[fld.key]||""}" id="mf-${fld.key}"></div>`).join("")}
      </div>
      <div style="display:flex;gap:8px">
        <button class="btn-save" onclick="${onSave}">Enregistrer</button>
        <button class="btn-cancel" onclick="${onCancel}">Annuler</button>
      </div>
    </div>`;
  }
  let addForm = STATE.addingMens ? mensForm({}, "submitAddMens()", "cancelAddMens()", "Nouveau bilan", "#1b5e20") : `<button class="btn-add" style="border-color:#a5d6a7;background:#e8f5e9;color:#1b5e20" onclick="startAddMens()">+ Ajouter un bilan</button>`;
  let cardsHtml = rows.map((row,ri)=>{
    if (STATE.editingMens===row.id) return mensForm(row, "submitEditMens()", "cancelEditMens()", "Modifier bilan", "#1565c0");
    const fieldsHtml = MENS_FIELDS.map(f=>{
      const d = ri>0 && rows[ri-1][f.key] && row[f.key] ? row[f.key]-rows[ri-1][f.key] : null;
      const better = d!==null && (["nombril","poids"].includes(f.key) ? d<0 : false);
      const worse  = d!==null && (["nombril","poids"].includes(f.key) ? d>0 : false);
      return `<div class="mens-field-card">
        <div class="fl">${f.label}</div>
        <div class="fv" style="color:${better?"#1b5e20":worse?"#b71c1c":"#1a1a2e"}">${row[f.key]||"—"} <span style="font-size:9px;font-weight:400">${f.unit}</span></div>
        ${d!==null&&d!==0?`<div class="fd" style="color:${better?"#1b5e20":worse?"#b71c1c":"#888"}">${d>0?"+":""}${d.toFixed(1)}</div>`:""}
      </div>`;
    }).join("");
    return `<div class="mens-card">
      <div class="mens-card-header"><h4>${row.date}</h4><div style="display:flex;gap:5px">
        <button class="btn-icon btn-edit" onclick="startEditMens(${row.id})">✏️</button>
        <button class="btn-icon btn-del" onclick="deleteMens(${row.id})">✕</button>
      </div></div>
      <div class="mens-card-grid">${fieldsHtml}</div>
    </div>`;
  }).join("");
  return summary + addForm + (rows.length===0?`<p style="text-align:center;color:#ccc;padding:30px 0;font-size:13px">Aucun bilan enregistre</p>`:cardsHtml);
}

function render() {
  const tabs = ["plan","suivi","mensuration"];
  const tabLabels = ["🥗 Plan alim.","📅 Suivi","📏 Mensurations"];
  let content = "";
  if (STATE.tab==="plan") content = renderPlan();
  else if (STATE.tab==="suivi") content = renderSuivi();
  else content = renderMensurations();
  document.getElementById("app").innerHTML = `
    <div class="header">
      <h1>Plan Alimentaire — Luca</h1>
      <p>HYROX Coaching · Donnees sauvegardees dans Google Sheets</p>
      <div style="margin-top:10px;display:flex;gap:8px;">
        <button onclick="loadAllData(true)" style="padding:8px 14px;border:none;border-radius:8px;background:#1565c0;color:#fff;font-size:12px;font-weight:700;cursor:pointer;">↻ Rafraichir</button>
      </div>
    </div>
    <div class="tabs">${tabs.map((t,i)=>`<button class="tab-btn ${STATE.tab===t?"active":""}" onclick="setTab('${t}')">${tabLabels[i]}</button>`).join("")}</div>
    <div id="content">${content}</div>`;
}

function setTab(t) { STATE.tab=t; STATE.openDay=null; STATE._dayForm=null; render(); }
function setPlan(k) { STATE.activePlan=k; render(); }
function toggleMeal(id) { STATE.openMeals[id] = STATE.openMeals[id]===false ? true : false; render(); }
function toggleProtein(key) { STATE.proteinPanels[key] = !STATE.proteinPanels[key]; render(); }
function selectProtein(key,idx) { STATE.proteinSelections[key]=idx; render(); }
function setCalMonth(m) { STATE.calMonth=m; STATE.openDay=null; STATE._dayForm=null; render(); }
function prevMonth() { if(STATE.calMonth===0){STATE.calMonth=11;STATE.calYear--;}else STATE.calMonth--; STATE.openDay=null; STATE._dayForm=null; render(); }
function nextMonth() { if(STATE.calMonth===11){STATE.calMonth=0;STATE.calYear++;}else STATE.calMonth++; STATE.openDay=null; STATE._dayForm=null; render(); }
function openDay(key) {
  if (STATE.openDay===key) { STATE.openDay=null; STATE._dayForm=null; }
  else { STATE.openDay=key; STATE._dayForm = STATE.suivi[key] ? {...STATE.suivi[key]} : {cal:"",diet:null,training:null,commentDiet:"",commentTraining:""}; }
  render();
}
function closeDay() { STATE.openDay=null; STATE._dayForm=null; render(); }
function updateDayForm(field,val) { if(!STATE._dayForm) STATE._dayForm={}; STATE._dayForm[field]=val; }
function setDayStatus(field,val) { if(!STATE._dayForm) STATE._dayForm={}; STATE._dayForm[field]=val; render(); }

async function saveDay() {
  const key = STATE.openDay; if(!key) return;
  const f = STATE._dayForm || {};
  const entry = { cal:f.cal?Number(f.cal):null, diet:f.diet||null, training:f.training||null, commentDiet:document.getElementById("dp-cd")?.value||"", commentTraining:document.getElementById("dp-ct")?.value||"" };
  STATE.suivi[key] = entry;
  STATE.openDay=null; STATE._dayForm=null;
  render();
  await api("saveDayData", { dateKey: key, dayData: entry });
  showToast("Enregistre ✓");
}
async function clearDay() {
  const key = STATE.openDay; if(!key) return;
  delete STATE.suivi[key];
  STATE.openDay=null; STATE._dayForm=null;
  render();
  await api("saveDayData", { dateKey: key, dayData: null });
  showToast("Jour efface");
}

function startAddMens() { STATE.addingMens=true; STATE.editingMens=null; render(); }
function cancelAddMens() { STATE.addingMens=false; render(); }
async function submitAddMens() {
  const date = document.getElementById("mf-date").value;
  if (!date) return alert("La date est obligatoire");
  const record = { id:nextId(STATE.mensurations), date };
  MENS_FIELDS.forEach(f => { const v=document.getElementById("mf-"+f.key)?.value; record[f.key]=v?Number(v):null; });
  STATE.mensurations.push(record);
  STATE.addingMens=false;
  render();
  await api("saveMensuration", { record });
  showToast("Bilan ajoute ✓");
}
function startEditMens(id) { STATE.editingMens=id; STATE.addingMens=false; render(); }
function cancelEditMens() { STATE.editingMens=null; render(); }
async function submitEditMens() {
  const date = document.getElementById("mf-date").value;
  if (!date) return alert("La date est obligatoire");
  STATE.mensurations = STATE.mensurations.map(r => {
    if (r.id!==STATE.editingMens) return r;
    const updated = { ...r, date };
    MENS_FIELDS.forEach(f => { const v=document.getElementById("mf-"+f.key)?.value; updated[f.key]=v?Number(v):null; });
    api("saveMensuration", { record: updated }).then(()=>showToast("Bilan modifie ✓"));
    return updated;
  });
  STATE.editingMens=null;
  render();
}
async function deleteMens(id) {
  if (!confirm("Supprimer ce bilan ?")) return;
  STATE.mensurations = STATE.mensurations.filter(r=>r.id!==id);
  render();
  await api("deleteMensuration", { id });
  showToast("Bilan supprime");
}

async function loadAllData(showMessage = false) {
  try {
    const [suivi, mensurations] = await Promise.all([
      api("getSuivi", {}),
      api("getMensurations", {})
    ]);
    STATE.suivi = suivi || {};
    STATE.mensurations = mensurations || [];
    render();
    if (showMessage) showToast("Donnees rafraichies");
  } catch(e) {
    STATE.suivi = {};
    STATE.mensurations = [];
    render();
  }
}

loadAllData(false);
setInterval(() => {
  const formOpen = STATE.addingMens || STATE.editingMens || STATE.openDay;
  if (!formOpen) loadAllData(false);
}, 30000);
</script>
</body>
</html>
